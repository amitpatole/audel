site_name: Audel
site_description: >-
  Ears for AI Agents — a machine-graded audio feedback loop coding agents consume to
  hear their own output and self-correct before claiming done.
site_url: https://amitpatole.github.io/audel/
repo_url: https://github.com/amitpatole/audel
repo_name: amitpatole/audel
copyright: MIT © Amit Patole
docs_dir: docs

theme:
  name: material
  palette:
    scheme: default          # Warm Paper — light, editorial
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            filters: ["!^_"]

nav:
  - Home: index.md
  - Quickstart: quickstart.md
